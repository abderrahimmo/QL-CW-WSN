# =============================================================================
#  omnetpp.ini
#  Simulation Scenarios — Self-Adaptive CW for WSN Using Q-Learning
#  OMNeT++ 6.0 / Castalia 3.3
#
#  Thesis : Self-Adaptive Contention Window for WSN Using Q-Learning
#  University : Ammar Telidji University of Laghouat
#  Authors   : Makhloufi Mohammed Abderrahim — Makhloufi Khadidja
#  Supervisor : Dr. Lakhdar Oulad Djedid
# =============================================================================

[General]
network                 = QL_WSN_Network
sim-time-limit          = 1000s
output-vector-file      = "${resultdir}/${configname}-${runnumber}.vec"
output-scalar-file      = "${resultdir}/${configname}-${runnumber}.sca"
seed-set                = ${repetition}

# ─── Channel & Radio (CC2420 — IEEE 802.15.4, 2.4 GHz) ───────
*.wirelessChannel.sigma              = 0
*.wirelessChannel.bidirectionalSigma = 0
*.node[*].Radio.RadioParametersFile  = "Parameters/Radio/CC2420.txt"
*.node[*].Radio.TxOutputPower        = "0dBm"
*.node[*].Radio.RxSensitivity        = "-95dBm"
*.node[*].Radio.carrierFreq          = 2405e6

# ─── QLearningMAC module ──────────────────────────────────────
*.node[*].Communication.MAC.typename     = "QLearningMAC"
*.node[*].Communication.MAC.alpha        = 0.1
*.node[*].Communication.MAC.gamma        = 0.9
*.node[*].Communication.MAC.epsilon0     = 1.0
*.node[*].Communication.MAC.epsilonMin   = 0.01
*.node[*].Communication.MAC.lambdaDecay  = 0.005
*.node[*].Communication.MAC.w1           = 0.5
*.node[*].Communication.MAC.w2           = 0.3
*.node[*].Communication.MAC.w3           = 0.2
*.node[*].Communication.MAC.cwMin        = 8
*.node[*].Communication.MAC.cwMax        = 256
*.node[*].Communication.MAC.macMaxRetries = 3
*.node[*].Communication.MAC.collectTraceInfo = true

# ─── Application (ThroughputTest) ────────────────────────────
*.node[*].Application.typename          = "ThroughputTest"
*.node[*].Application.packetSize        = 100
*.node[*].Application.constantDataRate  = 10

# ─── Energy model ─────────────────────────────────────────────
*.node[*].ResourceManager.initialEnergy = 18720
*.node[*].ResourceManager.ramSize       = 4096

# =============================================================================
# SCENARIO 1 — BEB baseline, 20 nodes, light traffic
# =============================================================================
[Config Scenario_BEB_Light]
description = "BEB baseline — 20 nodes, light traffic"
*.numNodes = 20
*.node[*].Communication.MAC.typename       = "IEEE802154Mac"
*.node[*].Application.constantDataRate     = 3

# =============================================================================
# SCENARIO 2 — QL-CW, density sweep (20 to 100 nodes)
# =============================================================================
[Config DensitySweep_QL]
description = "QL-CW — density sweep, medium traffic"
*.numNodes  = ${N = 20, 40, 60, 80, 100}
*.node[*].Application.constantDataRate = 10
repeat = 5

[Config DensitySweep_BEB]
description = "BEB — density sweep, medium traffic"
*.numNodes  = ${N = 20, 40, 60, 80, 100}
*.node[*].Communication.MAC.typename       = "IEEE802154Mac"
*.node[*].Application.constantDataRate = 10
repeat = 5

# =============================================================================
# SCENARIO 3 — QL-CW, traffic load sweep (60 nodes)
# =============================================================================
[Config TrafficSweep_QL]
description = "QL-CW — traffic sweep, 60 nodes"
*.numNodes  = 60
*.node[*].Application.constantDataRate = ${Rate = 3, 5, 10, 15, 20}
repeat = 5

[Config TrafficSweep_BEB]
description = "BEB — traffic sweep, 60 nodes"
*.numNodes  = 60
*.node[*].Communication.MAC.typename       = "IEEE802154Mac"
*.node[*].Application.constantDataRate = ${Rate = 3, 5, 10, 15, 20}
repeat = 5

# =============================================================================
# SCENARIO 4 — Hyperparameter sensitivity
# =============================================================================
[Config HyperSensitivity_Alpha]
description = "QL-CW — alpha sensitivity, 60 nodes"
*.numNodes  = 60
*.node[*].Communication.MAC.alpha          = ${A = 0.05, 0.1, 0.2, 0.4}
*.node[*].Application.constantDataRate     = 10
repeat = 3

[Config HyperSensitivity_Gamma]
description = "QL-CW — gamma sensitivity, 60 nodes"
*.numNodes  = 60
*.node[*].Communication.MAC.gamma          = ${G = 0.5, 0.7, 0.9, 0.99}
*.node[*].Application.constantDataRate     = 10
repeat = 3
